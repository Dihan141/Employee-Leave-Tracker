services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_leave_tracker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: leave_backend
    depends_on:
      - mysql
    ports:
      - "5223:5223"
    environment:
      ASPNETCORE_URLS: "http://+:5223"
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=employee_leave_tracker;user=root;password=root"

  frontend:
    build: ./frontend
    container_name: leave_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data: